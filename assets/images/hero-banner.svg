<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Bug Hunter Character (simplified, reliable rendering) -->
  <text font-family="'Courier New', 'Courier', monospace" font-size="15" fill="#7ee787" xml:space="preserve">
    <tspan x="115" y="80">    ___    </tspan>
    <tspan x="115" y="97">   /   \   </tspan>
    <tspan x="115" y="114">.----------.</tspan>
    <tspan x="115" y="131">| []    [] |</tspan>
    <tspan x="115" y="148">|    __    |</tspan>
    <tspan x="115" y="165">'----------'</tspan>
    <tspan x="115" y="182">/||| || |||\</tspan>
  </text>

  <!-- Title -->
  <text font-family="'Courier New', 'Courier', monospace" font-weight="bold" font-size="42" fill="#f0f6fc" x="380" y="110">Bug Hunter</text>
  <text font-family="'Courier New', 'Courier', monospace" font-size="16" fill="#8b949e" x="380" y="140">Deep QA for Claude Code</text>

  <!-- Divider -->
  <line x1="380" y1="155" x2="700" y2="155" stroke="#30363d" stroke-width="1"/>

  <!-- Tagline -->
  <text font-family="'Courier New', 'Courier', monospace" font-size="14" fill="#58a6ff" xml:space="preserve">
    <tspan x="380" y="180">"Crikey, look at the size of that</tspan>
    <tspan x="380" y="198"> codebase! Don't worry mate..."</tspan>
  </text>

  <!-- Feature pills -->
  <text font-family="'Courier New', 'Courier', monospace" font-size="13" xml:space="preserve">
    <tspan x="380" y="235" fill="#7ee787">10 agents</tspan>
    <tspan fill="#30363d">  //  </tspan>
    <tspan fill="#7ee787">auto stack detection</tspan>
    <tspan fill="#30363d">  //  </tspan>
    <tspan fill="#7ee787">SARIF</tspan>
  </text>
  <text font-family="'Courier New', 'Courier', monospace" font-size="13" xml:space="preserve">
    <tspan x="380" y="255" fill="#7ee787">convergence loop</tspan>
    <tspan fill="#30363d">  //  </tspan>
    <tspan fill="#7ee787">quality gates</tspan>
    <tspan fill="#30363d">  //  </tspan>
    <tspan fill="#7ee787">regression tracking</tspan>
  </text>

  <!-- Credit -->
  <text font-family="'Courier New', 'Courier', monospace" font-size="11" fill="#484f58" x="380" y="295">Built by Trav White, Neighbourhood CO (www.nbh.co)</text>
</svg>
