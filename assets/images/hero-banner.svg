<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Bug Hunter Character -->
  <text font-family="'Courier New', monospace" font-size="14" fill="#7ee787">
    <tspan x="100" y="60">         ___</tspan>
    <tspan x="100" y="76">        /   \</tspan>
    <tspan x="100" y="92">        _____</tspan>
    <tspan x="100" y="108">    ___/     \___</tspan>
    <tspan x="100" y="124">   /             \</tspan>
    <tspan x="100" y="140">  .---------------.</tspan>
    <tspan x="100" y="156">  |   []     []   |</tspan>
    <tspan x="100" y="172">  |      .__      |</tspan>
    <tspan x="100" y="188">  '---------------'</tspan>
    <tspan x="100" y="204">    |||  |||  |||</tspan>
  </text>

  <!-- Title -->
  <text font-family="'Courier New', monospace" font-weight="bold" font-size="42" fill="#f0f6fc" x="380" y="110">Bug Hunter</text>
  <text font-family="'Courier New', monospace" font-size="16" fill="#8b949e" x="380" y="140">Deep QA for Claude Code</text>

  <!-- Divider -->
  <line x1="380" y1="155" x2="700" y2="155" stroke="#30363d" stroke-width="1"/>

  <!-- Tagline -->
  <text font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" x="380" y="180">"Crikey, look at the size of that</text>
  <text font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" x="380" y="198"> codebase! Don't worry mate..."</text>

  <!-- Stats -->
  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="380" y="235">10 agents</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#30363d" x="490" y="235">|</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="505" y="235">auto stack detection</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#30363d" x="700" y="235">|</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="715" y="235">SARIF</text>

  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="380" y="255">convergence loop</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#30363d" x="520" y="255">|</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="535" y="255">quality gates</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#30363d" x="650" y="255">|</text>
  <text font-family="'Courier New', monospace" font-size="13" fill="#7ee787" x="665" y="255">regression tracking</text>

  <!-- Credit -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#484f58" x="380" y="295">Built by Trav White, Neighbourhood CO (www.nbh.co)</text>
</svg>
